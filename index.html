<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelMate Chatbot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 400px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .chat-header {
            background: #0077ff;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }
        
        .chat-box {
            height: 350px;
            padding: 15px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        
        .bot-message,
        .user-message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 80%;
        }
        
        .bot-message {
            background: #e3f2fd;
        }
        
        .user-message {
            background: #0077ff;
            color: white;
            margin-left: auto;
        }
        
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .chat-input button {
            margin-left: 10px;
            padding: 10px 15px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .chat-input button:hover {
            background: #0056cc;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <div class="chat-header">
            🌍 TravelMate
        </div>

        <div class="chat-box" id="chatBox">
            <div class="bot-message">
                Hello! Ask me about Chennai, Ooty, or Kodaikanal.
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type your destination...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script>
        function sendMessage() {

            let input = document.getElementById("userInput").value;
            let chatBox = document.getElementById("chatBox");

            if (input === "") return;

            chatBox.innerHTML +=
                `<div class="user-message">${input}</div>`;

            let msg = input.toLowerCase();
            let reply = "Sorry, I don't know about that location.";

            if (msg.includes("chennai")) {
                reply = "🏖️ Visit Marina Beach, VGP, Mahabalipuram.";
            } else if (msg.includes("ooty")) {
                reply = "⛰️ Ooty is famous for hills, tea estates, and cool weather.";
            } else if (msg.includes("kodaikanal")) {
                reply = "🌲 Kodaikanal is known for lakes and beautiful scenery.";
            }

            chatBox.innerHTML +=
                `<div class="bot-message">${reply}</div>`;

            document.getElementById("userInput").value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

</body>

</html>
